{% extends "base.html" %}

{% block title %}Удаление тега - Ticket System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Подтверждение удаления</h5>
            </div>
            <div class="card-body">
                <p class="mb-4">Вы действительно хотите удалить тег <strong>{{ tag.name }}</strong>?</p>
                <div class="alert alert-warning mb-4">
                    Удаление возможно только если тег не привязан к тикетам.
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'tag_list' %}" class="btn btn-outline-secondary">Отмена</a>
                    <form method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Удалить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
