<form id="comment-form" enctype="multipart/form-data" novalidate data-ticket-id="{{ ticket.id }}">
    {% csrf_token %}
    
    <div class="form-group mb-3">
        <label for="id_content" class="form-label" style="font-weight: 500; color: var(--fg-primary);">
            Ваш комментарий
        </label>
        <textarea name="content" 
                  id="id_content" 
                  class="form-control" 
                  rows="3" 
                  placeholder="Напишите комментарий..."
                  style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 10px; font-family: 'Inter', sans-serif;"></textarea>
        <small style="color: var(--fg-muted); display: block; margin-top: 4px;">
            <span id="comment-required-hint">Комментарий или файл обязателен</span>
        </small>
    </div>

    <!-- Загрузка файлов -->
    <div class="form-group mb-3">
        <label for="file-input" class="form-label" style="font-weight: 500; color: var(--fg-primary);">
            <i class="fas fa-paperclip"></i> Вложения (опционально)
        </label>
        <input type="file" 
               id="file-input" 
               name="attachments"
               class="form-control"
               multiple
               accept=".jpg,.jpeg,.png,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip"
               style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 8px;"
               onchange="addAttachment(this)">
        <small style="color: var(--fg-muted); display: block; margin-top: 6px;">
            <i class="fas fa-info-circle"></i> JPG, PNG, PDF, DOC, DOCX, XLS, XLSX, TXT, ZIP (макс. 10MB)
        </small>
    </div>

    <!-- Список загруженных файлов с прогресс барами -->
    <div id="attachments-list" class="mb-3"></div>

    <!-- Прогресс бар загрузки -->
    <div id="upload-progress" style="display: none; margin-bottom: 16px;">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <small style="color: var(--fg-muted); font-weight: 500;">
                <i class="fas fa-cloud-upload-alt"></i> Загрузка...
            </small>
            <small id="progress-percent" style="color: var(--primary); font-weight: 600;">0%</small>
        </div>
        <div style="width: 100%; height: 6px; background-color: var(--border-subtle); border-radius: 3px; overflow: hidden;">
            <div id="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary) 0%, var(--primary-strong) 100%); transition: width 0.3s ease;"></div>
        </div>
    </div>

    {% if form.is_internal %}
    <div class="form-check mb-3">
        <input type="checkbox" 
               name="is_internal" 
               id="id_is_internal" 
               class="form-check-input"
               style="cursor: pointer;">
        <label class="form-check-label" for="id_is_internal" style="cursor: pointer;">
            <i class="fas fa-lock" style="color: var(--danger); margin-right: 6px;"></i>
            Только для сотрудников
        </label>
    </div>
    {% endif %}

    <button type="submit" 
            id="comment-submit-btn"
            class="btn btn-primary"
            style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%); 
                   border: none; 
                   font-weight: 500; 
                   padding: 10px 24px;
                   box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
                   transition: all var(--transition-fast);">
        <i class="fas fa-paper-plane"></i> Отправить
    </button>
</form>

<script>
let uploadedFilesData = new DataTransfer();
const allowedAttachmentExtensions = ['jpg', 'jpeg', 'png', 'pdf', 'doc', 'docx', 'xls', 'xlsx', 'txt', 'zip'];

function isAllowedAttachment(fileName) {
    const parts = (fileName || '').toLowerCase().split('.');
    const extension = parts.length > 1 ? parts.pop() : '';
    return allowedAttachmentExtensions.includes(extension);
}

function addAttachment(input) {
    if (!input.files || !input.files.length) {
        return;
    }

    Array.from(input.files).forEach(file => {
        if (!isAllowedAttachment(file.name)) {
            alert('Недопустимый тип файла: ' + file.name + '. Разрешены JPG, PNG, PDF, DOC, DOCX, XLS, XLSX, TXT и ZIP.');
            return;
        }

        if (file.size > 10 * 1024 * 1024) {
            alert('Файл слишком большой: ' + file.name + '. Максимум 10MB');
            return;
        }

        uploadedFilesData.items.add(file);

        const attachmentsList = document.getElementById('attachments-list');
        const fileItem = document.createElement('div');
        fileItem.className = 'd-flex justify-content-between align-items-center p-3 bg-light rounded-2 mb-2';
        fileItem.style.cssText = 'background-color: #f8f9fa; border: 1px solid #e5e7eb; border-radius: 8px;';
        fileItem.innerHTML = `
            <div>
                <i class="fas fa-file me-2" style="color: var(--primary);"></i>
                <strong>${file.name}</strong>
                <small class="d-block text-muted">${(file.size / 1024).toFixed(2)} KB</small>
            </div>
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeAttachment(this, '${file.name}')">
                <i class="fas fa-trash"></i>
            </button>
        `;
        attachmentsList.appendChild(fileItem);
    });

    input.files = uploadedFilesData.files;
    input.value = '';
}

function removeAttachment(btn, fileName) {
    btn.closest('div').remove();

    const newDataTransfer = new DataTransfer();
    Array.from(uploadedFilesData.files).forEach(file => {
        if (file.name !== fileName) {
            newDataTransfer.items.add(file);
        }
    });
    uploadedFilesData = newDataTransfer;
    document.getElementById('file-input').files = uploadedFilesData.files;
}

document.getElementById('comment-form').addEventListener('submit', function(evt) {
    evt.preventDefault();

    const form = this;
    const contentField = document.getElementById('id_content');
    const commentText = contentField.value.trim();
    const hasFiles = uploadedFilesData.files.length > 0;

    if (!commentText && !hasFiles) {
        contentField.classList.add('is-invalid');
        contentField.style.borderColor = '#dc2626';
        contentField.style.boxShadow = '0 0 0 3px rgba(220, 38, 38, 0.1)';
        return false;
    }

    contentField.classList.remove('is-invalid');
    contentField.style.borderColor = '';
    contentField.style.boxShadow = '';

    const formData = new FormData();
    formData.append('content', commentText);
    const isInternalCheckbox = document.getElementById('id_is_internal');
    formData.append('is_internal', isInternalCheckbox?.checked ? 'on' : 'off');
    formData.append('csrfmiddlewaretoken', document.querySelector('[name="csrfmiddlewaretoken"]').value);

    Array.from(uploadedFilesData.files).forEach(file => {
        formData.append('attachments', file);
    });

    const progressDiv = document.getElementById('upload-progress');
    const progressBar = document.getElementById('progress-bar');
    const progressPercent = document.getElementById('progress-percent');
    const submitBtn = document.getElementById('comment-submit-btn');

    progressDiv.style.display = 'block';
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.6';
    submitBtn.style.cursor = 'not-allowed';

    const xhr = new XMLHttpRequest();

    xhr.upload.addEventListener('progress', (event) => {
        if (event.lengthComputable) {
            const percentComplete = Math.round((event.loaded / event.total) * 100);
            progressBar.style.width = percentComplete + '%';
            progressPercent.textContent = percentComplete + '%';
        }
    });

    xhr.addEventListener('load', () => {
        if (xhr.status === 201) {
            const commentsContainer = document.getElementById('comments-container');
            const parser = new DOMParser();
            const doc = parser.parseFromString(xhr.responseText, 'text/html');
            const newComment = doc.body.firstElementChild;

            if (newComment && commentsContainer) {
                const emptyState = commentsContainer.querySelector('.min-h-96');
                if (emptyState) {
                    emptyState.remove();
                }
                commentsContainer.appendChild(newComment);
            }

            form.reset();
            uploadedFilesData = new DataTransfer();
            document.getElementById('attachments-list').innerHTML = '';
            document.getElementById('file-input').files = uploadedFilesData.files;

            if (typeof updateCommentCount === 'function') {
                updateCommentCount();
            }
            if (typeof scrollToBottom === 'function') {
                scrollToBottom();
            }
        } else if (xhr.status === 400) {
            try {
                const error = JSON.parse(xhr.responseText);
                alert('Ошибка: ' + error.error);
            } catch (e) {
                alert('Ошибка при отправке комментария');
            }
        } else {
            alert('Ошибка при отправке комментария: ' + xhr.status);
        }

        progressDiv.style.display = 'none';
        progressBar.style.width = '0%';
        progressPercent.textContent = '0%';
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
    });

    xhr.addEventListener('error', () => {
        alert('Ошибка сети при загрузке');
        progressDiv.style.display = 'none';
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
    });

    const ticketId = form.dataset.ticketId;
    xhr.open('POST', '/' + ticketId + '/comment/');
    xhr.send(formData);
});
</script>
