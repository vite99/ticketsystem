<form id="comment-form" 
      hx-post="{% url 'add_comment' ticket.id %}" 
      hx-target="#comments-container" 
      hx-select="#comments-container > *"
      hx-swap="innerHTML swap:0.3s"
      hx-on::after-request="if(event.detail.xhr.status === 201) { document.getElementById('comment-form').reset(); document.getElementById('attachments-list').innerHTML = ''; uploadedFiles = []; }"
      enctype="multipart/form-data"
      novalidate>
    {% csrf_token %}
    
    <div class="form-group mb-3">
        <label for="id_content" class="form-label" style="font-weight: 500; color: var(--fg-primary);">
            Ваш комментарий
        </label>
        <textarea name="content" 
                  id="id_content" 
                  class="form-control" 
                  rows="3" 
                  placeholder="Напишите комментарий..."
                  style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 10px; font-family: 'Inter', sans-serif;"></textarea>
        <small style="color: var(--fg-muted); display: block; margin-top: 4px;">
            <span id="comment-required-hint">Комментарий или файл обязателен</span>
        </small>
    </div>

    <!-- Загрузка файлов -->
    <div class="form-group mb-3">
        <label for="file-input" class="form-label" style="font-weight: 500; color: var(--fg-primary);">
            <i class="fas fa-paperclip"></i> Вложения (опционально)
        </label>
        <input type="file" 
               id="file-input" 
               class="form-control"
               accept=".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip"
               style="border: 1px solid var(--border-subtle); border-radius: 6px; padding: 8px;"
               onchange="addAttachment(this)">
        <small style="color: var(--fg-muted); display: block; margin-top: 6px;">
            <i class="fas fa-info-circle"></i> JPG, PNG, PDF, DOC, XLS, TXT, ZIP
        </small>
    </div>

    <!-- Список загруженных файлов -->
    <div id="attachments-list" class="mb-3"></div>

    {% if form.is_internal %}
    <div class="form-check mb-3">
        <input type="checkbox" 
               name="is_internal" 
               id="id_is_internal" 
               class="form-check-input"
               style="cursor: pointer;">
        <label class="form-check-label" for="id_is_internal" style="cursor: pointer;">
            <i class="fas fa-lock" style="color: var(--danger); margin-right: 6px;"></i>
            Только для сотрудников
        </label>
    </div>
    {% endif %}

    <button type="submit" 
            id="comment-submit-btn"
            class="btn btn-primary"
            style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%); 
                   border: none; 
                   font-weight: 500; 
                   padding: 10px 24px;
                   box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
                   transition: all var(--transition-fast);">
        <i class="fas fa-paper-plane"></i> Отправить
    </button>
</form>

<script>
// Хранилище файлов в памяти
let uploadedFiles = [];

function addAttachment(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        
        // Проверка размера (макс 10MB)
        if (file.size > 10 * 1024 * 1024) {
            alert('Файл слишком большой! Максимум 10MB');
            input.value = '';
            return;
        }
        
        uploadedFiles.push(file);
        
        // Показать загруженный файл
        const attachmentsList = document.getElementById('attachments-list');
        const fileItem = document.createElement('div');
        fileItem.className = 'alert alert-info d-flex justify-content-between align-items-center';
        fileItem.style.marginBottom = '8px';
        fileItem.innerHTML = `
            <span>
                <i class="fas fa-file"></i> ${file.name} (${(file.size / 1024).toFixed(2)} KB)
            </span>
            <button type="button" class="btn btn-sm btn-outline-danger" 
                    onclick="removeAttachment(this, '${file.name}')">
                <i class="fas fa-trash"></i>
            </button>
        `;
        attachmentsList.appendChild(fileItem);
        
        // Очистить input
        input.value = '';
    }
}

function removeAttachment(btn, fileName) {
    btn.closest('.alert').remove();
    uploadedFiles = uploadedFiles.filter(f => f.name !== fileName);
}

// Перехватить submit формы для добавления файлов
document.getElementById('comment-form').addEventListener('submit', function(evt) {
    const contentField = document.getElementById('id_content');
    const commentText = contentField.value.trim();
    
    // Проверка: должен быть либо комментарий, либо файл
    if (!commentText && uploadedFiles.length === 0) {
        evt.preventDefault();
        contentField.classList.add('is-invalid');
        contentField.style.borderColor = 'var(--danger)';
        return false;
    }
    
    // Если только файлы и нет текста - это ОК
    // Если текст есть - очищаем класс ошибки
    if (commentText) {
        contentField.classList.remove('is-invalid');
        contentField.style.borderColor = '';
    }
});

// Обработка FormData с файлами через HTMX
document.getElementById('comment-form').addEventListener('htmx:configRequest', function(evt) {
    if (uploadedFiles.length > 0) {
        const formData = new FormData();
        
        // Добавить основные поля
        formData.append('content', document.getElementById('id_content').value);
        formData.append('is_internal', document.getElementById('id_is_internal').checked ? 'on' : 'off');
        formData.append('csrfmiddlewaretoken', document.querySelector('[name="csrfmiddlewaretoken"]').value);
        
        // Добавить каждый файл
        uploadedFiles.forEach((file) => {
            formData.append('attachments', file);
        });
        
        evt.detail.body = formData;
    }
});
</script>
