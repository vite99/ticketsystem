{% if count > 0 %}
<span class="badge bg-danger position-relative" style="margin-left: 8px; animation: pulse 2s infinite;">
    <i class="fas fa-bell"></i> {{ count }}
    <span class="position-absolute top-0 start-100 translate-middle p-2 bg-danger border border-light rounded-circle" style="width: 10px; height: 10px; animation: pulse-dot 2s infinite;"></span>
</span>
<style>
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }
    @keyframes pulse-dot {
        0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
        50% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
    }
</style>
{% endif %}
